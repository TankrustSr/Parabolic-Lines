<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parabolica</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webm-muxer@5.0.2/build/webm-muxer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    
    <style>
        :root {
            --bg: #1e1e1e;
            --panel-bg: #2d2d2d;
            --text: #ffffff;
            --accent: #007acc;
            --accent-hover: #005f9e;
            --border: #444;
            --success: #28a745;
            --success-hover: #218838;
            --danger: #dc3545;
            --danger-hover: #c82333;
            --warning: #e67e22;
            --warning-hover: #d35400;
        }
        
        * { box-sizing: border-box; }
        input, select, button { margin: 0; font-family: inherit; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100dvh; 
            overflow: hidden;
            -webkit-text-size-adjust: 100%; 
        }
        
        .sidebar {
            width: 350px;
            background-color: var(--panel-bg);
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            display: block; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0; 
        }
        
        .sidebar::-webkit-scrollbar { width: 8px; }
        .sidebar::-webkit-scrollbar-track { background: var(--bg); }
        .sidebar::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

        .canvas-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e5e5e5;
            padding: 20px;
            min-width: 0; 
            min-height: 0;
        }
        
        #drawingCanvas {
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            background-color: #ffffff;
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            aspect-ratio: 1 / 1;
            flex-shrink: 1; 
            min-width: 0;
            min-height: 0;
        }
        
        #exportSvgContainer { display: none; }

        h2 { margin: 0 0 15px 0; font-size: 1.3rem; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
        h3 { margin: 20px 0 10px 0; font-size: 1.05rem; color: #ccc; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        
        .control-group { display: block; margin-bottom: 12px; }
        .checkbox-group { display: flex; flex-direction: row; align-items: center; cursor: pointer; font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; margin: 0 8px 0 0; }
        
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
        .value-display { font-size: 0.8rem; color: #aaa; float: right; }

        input[type="range"] { 
            -webkit-appearance: none;
            width: 100%; 
            background: transparent;
            margin: 8px 0; 
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px; width: 20px;
            border-radius: 50%;
            background: var(--accent);
            margin-top: -8px;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            background: #555; border-radius: 2px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 32px;
            padding: 0;
            border-radius: 4px;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

        select, input[type="text"] { 
            -webkit-appearance: none;
            width: 100%; 
            padding: 8px; 
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
        }
        
        button {
            display: block;
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            touch-action: manipulation;
            margin-bottom: 8px;
        }
        button:hover { background-color: var(--accent-hover); }
        button:disabled { background-color: #555 !important; cursor: not-allowed; }

        .preset-buttons, .preset-input-row { display: flex; flex-direction: row; gap: 8px; margin-top: 4px; margin-bottom: 0; width: 100%; }
        .preset-buttons button, .preset-input-row button { flex: 1; min-width: 0; padding: 8px; font-size: 0.85rem; margin: 0; }
        .preset-input-row input[type="text"] { flex: 2; min-width: 0; margin: 0; }
        
        .btn-save { background-color: var(--success); }
        .btn-save:hover { background-color: var(--success-hover); }
        .btn-delete { background-color: var(--danger); transition: background-color 0.2s, color 0.2s; }
        .btn-delete:hover { background-color: var(--danger-hover); }
        .btn-video { background-color: var(--warning); padding: 10px; font-size: 0.9rem; }
        .btn-video:hover { background-color: var(--warning-hover); }

        #angleControl, #axesControl, #polygonControl, #circleStepControl, #ellipseRatioControl, #halftoneSizeControl, #halftoneFalloffControl, #waveParamsControl, #flowControls, #halftoneAnchorControl { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Controls</h2>
        <h3>Presets</h3>
        <div class="control-group">
            <select id="presetSelect"><option value="">-- Select a Saved Preset --</option></select>
            <div class="preset-buttons">
                <button id="loadPresetBtn">Load</button>
                <button id="deletePresetBtn" class="btn-delete">Delete</button>
            </div>
            <div class="preset-input-row">
                <input type="text" id="presetNameInput" placeholder="Name new preset...">
                <button id="savePresetBtn" class="btn-save">Save</button>
            </div>
        </div>

        <h3>Animation & Export</h3>
        <label class="checkbox-group" for="animatePhase">
            <input type="checkbox" id="animatePhase"> Play All Animations
        </label>

        <div class="control-group" style="margin-top: 4px;">
            <label for="trailFrames">Motion Trail (Ghosts) <span id="trailFramesVal" class="value-display">0</span></label>
            <input type="range" id="trailFrames" min="0" max="30" step="1" value="0">
        </div>
        <div class="control-group">
            <label for="trailSpacing">Trail Spacing <span id="trailSpacingVal" class="value-display">1.0</span></label>
            <input type="range" id="trailSpacing" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>

        <button id="exportVidBtn" class="btn-video" style="margin-top: 8px;">Export Looping Video (1080p)</button>
        <button id="exportWebmBtn" class="btn-video" style="background-color: #9b59b6;">Export Looping WebM</button>
        <button id="exportGifBtn" class="btn-video" style="background-color: #e67e22;">Export Looping GIF (50FPS)</button>
        <button id="exportBtn" style="margin-top: 4px;">Export Image as .SVG</button>

        <h3>Core Geometry</h3>
        <div class="control-group">
            <label for="styleSelect">Drawing Style</label>
            <select id="styleSelect">
                <option value="circle_string">Circular Mandala</option>
                <option value="ellipse_string">Elliptical Mandala</option>
                <option value="circle_to_circle">Concentric Tunnel</option>
                <option value="v_shape">Single Angle (V-Shape)</option>
                <option value="arc_shell">Arc & Line Shell</option>
                <option value="double_arc">Double Arc (Lens)</option>
                <option value="star_center">Star (Center Outward)</option>
                <option value="multi_axis">Custom Multi-Axis Star</option>
                <option value="polygon_ring">Polygon Ring</option>
                <option value="square_circle">Inscribed Circle (Square Corners)</option>
                <option value="asymmetric_star">Asymmetric Star (3D Warp)</option>
                <option value="hourglass">Double Hourglass (Woven)</option>
            </select>
        </div>

        <div class="control-group">
            <label for="linesCount">Number of Points (X/Y) <span id="linesVal" class="value-display">45</span></label>
            <input type="range" id="linesCount" min="5" max="200" value="45">
        </div>
        <div class="control-group">
            <label for="curveAmount">Line Curvature <span id="curveVal" class="value-display">0.0</span></label>
            <input type="range" id="curveAmount" min="-1.5" max="1.5" step="0.1" value="0.0">
        </div>
        <div class="control-group">
            <label for="erosionAmount">Spatial Erosion (Outside-In) <span id="erosionVal" class="value-display">0.0</span></label>
            <input type="range" id="erosionAmount" min="0.0" max="1.0" step="0.05" value="0.0">
        </div>

        <h3>Line Modulation (Waves)</h3>
        <div class="control-group">
            <label for="waveType">Waveform</label>
            <select id="waveType">
                <option value="none">None</option>
                <option value="sine">Sine Wave</option>
                <option value="sawtooth">Sawtooth</option>
                <option value="square">Square Wave</option>
            </select>
        </div>
        <div id="waveParamsControl">
            <div class="control-group">
                <label for="waveAmp">Amplitude <span id="wAmpVal" class="value-display">10</span></label>
                <input type="range" id="waveAmp" min="0" max="100" step="1" value="10">
            </div>
            <div class="control-group">
                <label for="waveFreq">Frequency (Cycles) <span id="wFreqVal" class="value-display">5</span></label>
                <input type="range" id="waveFreq" min="0.1" max="20" step="0.1" value="1">
            </div>
            <div class="control-group">
                <label for="wavePhase">Wave Phase (Offset) <span id="wPhaseVal" class="value-display">0</span></label>
                <input type="range" id="wavePhase" min="0" max="360" step="any" value="0">
            </div>
            <div class="control-group" style="margin-top: 5px;">
                <label for="animSpeed">Wave Anim Speed <span id="animSpeedVal" class="value-display">2.0</span></label>
                <input type="range" id="animSpeed" min="-5.0" max="5.0" step="any" value="2.0">
            </div>
        </div>

        <div class="control-group" id="angleControl">
            <label for="angleCount">Axis Angle (Degrees) <span id="angleVal" class="value-display">60</span></label>
            <input type="range" id="angleCount" min="10" max="170" value="60">
        </div>
        <div class="control-group" id="axesControl">
            <label for="multiAxesCount">Number of Axes <span id="axesVal" class="value-display">8</span></label>
            <input type="range" id="multiAxesCount" min="3" max="24" value="8">
        </div>
        <div class="control-group" id="polygonControl">
            <label for="polygonSides">Number of Sides (Polygon) <span id="polygonVal" class="value-display">6</span></label>
            <input type="range" id="polygonSides" min="3" max="20" value="6">
        </div>
        <div class="control-group" id="circleStepControl">
            <label for="circleStep">Connection Step (Twist) <span id="circleStepVal" class="value-display">16</span></label>
            <input type="range" id="circleStep" min="1" max="99" value="16">
        </div>
        <div class="control-group" id="ellipseRatioControl">
            <label for="ellipseRatio">Ellipse Aspect Ratio <span id="ellipseRatioVal" class="value-display">0.6</span></label>
            <input type="range" id="ellipseRatio" min="0.1" max="2.0" step="0.05" value="0.6">
        </div>

        <h3>Aesthetics & Styles</h3>
        <div class="control-group">
            <label for="lineStyle">Line Dash Style</label>
            <select id="lineStyle">
                <option value="solid">Solid</option>
                <option value="dashed">Dashed</option>
                <option value="dotted">Dotted</option>
                <option value="halftone">Halftone Dots</option>
            </select>
        </div>

        <div id="flowControls">
            <div class="control-group" id="halftoneSizeControl">
                <label for="halftoneSize">Halftone Dot Size <span id="htSizeVal" class="value-display">3.0</span></label>
                <input type="range" id="halftoneSize" min="0.5" max="15.0" step="0.5" value="3.0">
            </div>
            <div class="control-group" id="halftoneFalloffControl">
                <label for="halftoneFalloff">Halftone End Falloff <span id="htFalloffVal" class="value-display">0.75</span></label>
                <input type="range" id="halftoneFalloff" min="0.0" max="1.0" step="0.05" value="0.75">
            </div>
            <div class="control-group" id="halftoneAnchorControl" style="margin-top: 5px;">
                <label for="colorAnchor">Dot Wave & Color Anchor</label>
                <select id="colorAnchor">
                    <option value="space">Stay in Position</option>
                    <option value="dot">Move with Dot</option>
                </select>
            </div>
            <div class="control-group" style="margin-top: 5px;">
                <label for="flowPhase">Dash/Dot Phase (Offset) <span id="fPhaseVal" class="value-display">0</span></label>
                <input type="range" id="flowPhase" min="0" max="100" step="any" value="0">
            </div>
            <div class="control-group">
                <label for="flowSpeed">Dash/Dot Anim Speed <span id="fSpeedVal" class="value-display">0.20</span></label>
                <input type="range" id="flowSpeed" min="-1.0" max="1.0" step="any" value="0.20">
            </div>
        </div>

        <div class="control-group" style="margin-top: 10px;">
            <label for="opacityFade">Line End Fade (Opacity) <span id="fadeVal" class="value-display">0.10</span></label>
            <input type="range" id="opacityFade" min="0.0" max="0.5" step="any" value="0.0">
        </div>
        <div class="control-group">
            <label for="bgColor">Background Color</label>
            <input type="color" id="bgColor" value="#ffffff">
        </div>
        <div class="control-group">
            <label for="lineColor">Base Line Color</label>
            <input type="color" id="lineColor" value="#000000">
        </div>
        <div class="control-group">
            <label for="highlightColor">Amplitude Highlight Color</label>
            <input type="color" id="highlightColor" value="#ff0055">
        </div>
        <div class="control-group">
            <label for="highlightIntensity">Highlight Intensity <span id="hIntenVal" class="value-display">0.0</span></label>
            <input type="range" id="highlightIntensity" min="0.0" max="1.0" step="any" value="0.0">
        </div>
        <div class="control-group">
            <label for="lineWidth">Line Thickness <span id="widthVal" class="value-display">1.0</span></label>
            <input type="range" id="lineWidth" min="0.1" max="10.0" step="0.1" value="1.0">
        </div>

        <h3>Layout & Symmetry</h3>
        
        <div class="control-group">
            <label for="layoutMode">Pattern Layout</label>
            <select id="layoutMode">
                <option value="radial">Radial (Kaleidoscope)</option>
                <option value="spiral">Spiral Vortex</option>
                <option value="linear">Linear Array</option>
            </select>
        </div>

        <div class="control-group" id="radialControls">
            <label for="symmetryCount">Kaleidoscope Arms <span id="symVal" class="value-display">1x</span></label>
            <input type="range" id="symmetryCount" min="1" max="24" value="1">
        </div>

        <div id="spiralControls">
            <div class="control-group">
                <label for="spiralSteps">Spiral Depth (Steps) <span id="spiralStepsVal" class="value-display">50</span></label>
                <input type="range" id="spiralSteps" min="1" max="200" value="50">
            </div>
            <div class="control-group">
                <label for="spiralTwist">Twist Angle <span id="spiralTwistVal" class="value-display">15.0°</span></label>
                <input type="range" id="spiralTwist" min="-180" max="180" step="0.5" value="15.0">
            </div>
            <div class="control-group">
                <label for="spiralShrink">Scale Falloff <span id="spiralShrinkVal" class="value-display">0.92</span></label>
                <input type="range" id="spiralShrink" min="0.50" max="1.05" step="0.01" value="0.92">
            </div>
        </div>

        <div id="linearControls">
            <div class="control-group">
                <label for="linearCopies">Array Copies <span id="linearCopiesVal" class="value-display">5</span></label>
                <input type="range" id="linearCopies" min="1" max="50" value="5">
            </div>
            <div class="control-group">
                <label for="linearX">X Spacing <span id="linearXVal" class="value-display">50px</span></label>
                <input type="range" id="linearX" min="-200" max="200" step="1" value="50">
            </div>
            <div class="control-group">
                <label for="linearY">Y Spacing <span id="linearYVal" class="value-display">0px</span></label>
                <input type="range" id="linearY" min="-200" max="200" step="1" value="0">
            </div>
        </div>

        <label class="checkbox-group" for="mirrorSymmetry" style="margin-top: 10px;">
            <input type="checkbox" id="mirrorSymmetry"> Mirror Reflection (X-Axis)
        </label>
        
        <div class="control-group">
            <label for="globalRotation">Global Rotation (Degrees) <span id="rotVal" class="value-display">0</span></label>
            <input type="range" id="globalRotation" min="0" max="360" value="0">
        </div>
        <div class="control-group">
            <label for="offsetX">Center Offset X <span id="offsetXVal" class="value-display">0</span></label>
            <input type="range" id="offsetX" min="-250" max="250" value="0">
        </div>
        <div class="control-group">
            <label for="offsetY">Center Offset Y <span id="offsetYVal" class="value-display">0</span></label>
            <input type="range" id="offsetY" min="-250" max="250" value="0">
        </div>
        <div class="control-group">
            <label for="zoomValue">Global Zoom (Camera) <span id="zoomVal" class="value-display">1.0x</span></label>
            <input type="range" id="zoomValue" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label for="scaleValue">Base Shape Size <span id="scaleVal" class="value-display">1.0</span></label>
            <input type="range" id="scaleValue" min="0.1" max="1.5" step="0.05" value="1.0">
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="drawingCanvas"></canvas>
    </div>

    <div id="exportSvgContainer">
        <svg id="exportSvg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg>
    </div>
    <script>
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const exportSvg = document.getElementById('exportSvg');
        
        let isCanvasInitialized = false;

        function resizeCanvas() {
            const logicalSize = 1000; 
            const dpr = window.devicePixelRatio || 1;
            
            if (!isCanvasInitialized) {
                canvas.width = logicalSize * dpr;
                canvas.height = logicalSize * dpr;
                ctx.setTransform(1, 0, 0, 1, 0, 0); 
                ctx.scale(dpr, dpr);
                isCanvasInitialized = true;
            }
            return logicalSize; 
        }

        const baseCanvas = document.createElement('canvas');
        const baseCtx = baseCanvas.getContext('2d');
        
        const styleSelect = document.getElementById('styleSelect');
        const linesCount = document.getElementById('linesCount');
        const curveAmountInput = document.getElementById('curveAmount');
        const erosionAmountInput = document.getElementById('erosionAmount');
        const waveType = document.getElementById('waveType');
        const waveAmp = document.getElementById('waveAmp');
        const waveFreq = document.getElementById('waveFreq');
        const wavePhase = document.getElementById('wavePhase');
        const animSpeed = document.getElementById('animSpeed');
        const angleCount = document.getElementById('angleCount');
        const multiAxesCount = document.getElementById('multiAxesCount');
        const polygonSides = document.getElementById('polygonSides');
        const circleStep = document.getElementById('circleStep');
        const ellipseRatio = document.getElementById('ellipseRatio');
        
        const layoutMode = document.getElementById('layoutMode');
        const symmetryCount = document.getElementById('symmetryCount');
        const spiralSteps = document.getElementById('spiralSteps');
        const spiralTwist = document.getElementById('spiralTwist');
        const spiralShrink = document.getElementById('spiralShrink');
        const linearCopies = document.getElementById('linearCopies');
        const linearX = document.getElementById('linearX');
        const linearY = document.getElementById('linearY');
        
        const mirrorSymmetry = document.getElementById('mirrorSymmetry');
        const globalRotation = document.getElementById('globalRotation');
        const offsetInputX = document.getElementById('offsetX');
        const offsetInputY = document.getElementById('offsetY');
        const zoomValue = document.getElementById('zoomValue');
        const scaleValue = document.getElementById('scaleValue');
        const lineStyle = document.getElementById('lineStyle');
        const halftoneSize = document.getElementById('halftoneSize');
        const halftoneFalloff = document.getElementById('halftoneFalloff');
        const colorAnchor = document.getElementById('colorAnchor');
        const flowPhase = document.getElementById('flowPhase');
        const flowSpeed = document.getElementById('flowSpeed');
        const opacityFade = document.getElementById('opacityFade');
        const highlightColor = document.getElementById('highlightColor');
        const highlightIntensity = document.getElementById('highlightIntensity');
        const bgColor = document.getElementById('bgColor');
        const lineColor = document.getElementById('lineColor');
        const lineWidth = document.getElementById('lineWidth');
        const trailFrames = document.getElementById('trailFrames');
        const trailSpacing = document.getElementById('trailSpacing');
        
        const presetSelect = document.getElementById('presetSelect');
        const presetNameInput = document.getElementById('presetNameInput');
        const animatePhase = document.getElementById('animatePhase');
        const exportVidBtn = document.getElementById('exportVidBtn');
        const exportWebmBtn = document.getElementById('exportWebmBtn');
        const exportGifBtn = document.getElementById('exportGifBtn');

        const stateControls = [
            'styleSelect', 'linesCount', 'curveAmount', 'erosionAmount', 
            'waveType', 'waveAmp', 'waveFreq', 'wavePhase', 'animSpeed',
            'angleCount', 'multiAxesCount', 'polygonSides', 'circleStep', 'ellipseRatio', 
            'layoutMode', 'symmetryCount', 'spiralSteps', 'spiralTwist', 'spiralShrink', 'linearCopies', 'linearX', 'linearY',
            'mirrorSymmetry', 'globalRotation', 'offsetX', 'offsetY', 
            'zoomValue', 'scaleValue', 'lineStyle', 'halftoneSize', 'halftoneFalloff', 'colorAnchor', 'flowPhase', 'flowSpeed',
            'opacityFade', 'highlightColor', 'highlightIntensity', 'trailFrames', 'trailSpacing',
            'bgColor', 'lineColor', 'lineWidth', 'animatePhase'
        ];

        let dynProps = {};
        let isAnimating = false;
        let isRecording = false;
        let animRequest;

        animatePhase.addEventListener('change', function(e) {
            isAnimating = e.target.checked;
            if (isAnimating) { animationLoop(); } 
            else { cancelAnimationFrame(animRequest); }
        });

        function animationLoop() {
            if (!isAnimating || isRecording) return;
            let wSpeed = parseFloat(animSpeed.value);
            if (wSpeed !== 0 && waveType.value !== 'none') {
                let phase = parseFloat(wavePhase.value);
                phase = (phase + wSpeed) % 360;
                if (phase < 0) phase += 360;
                wavePhase.value = phase.toFixed(2);
            }
            let fSpeed = parseFloat(flowSpeed.value);
            if (fSpeed !== 0 && lineStyle.value !== 'solid') {
                let fPhase = parseFloat(flowPhase.value);
                fPhase = (fPhase + fSpeed) % 100;
                if (fPhase < 0) fPhase += 100;
                flowPhase.value = fPhase.toFixed(2);
            }
            updateDisplays();
            drawLiveCanvas();
            animRequest = requestAnimationFrame(animationLoop);
        }

            document.getElementById('polygonVal').innerText = polygonSides.value;
            document.getElementById('circleStepVal').innerText = circleStep.value;
            document.getElementById('ellipseRatioVal').innerText = parseFloat(ellipseRatio.value).toFixed(2);
            
            document.getElementById('symVal').innerText = symmetryCount.value + 'x';
            document.getElementById('spiralStepsVal').innerText = spiralSteps.value;
            document.getElementById('spiralTwistVal').innerText = parseFloat(spiralTwist.value).toFixed(1) + '°';
            document.getElementById('spiralShrinkVal').innerText = parseFloat(spiralShrink.value).toFixed(2);
            document.getElementById('linearCopiesVal').innerText = linearCopies.value;
            document.getElementById('linearXVal').innerText = linearX.value + 'px';
            document.getElementById('linearYVal').innerText = linearY.value + 'px';

            document.getElementById('rotVal').innerText = globalRotation.value;
            document.getElementById('offsetXVal').innerText = offsetInputX.value;
            document.getElementById('offsetYVal').innerText = offsetInputY.value;
            document.getElementById('zoomVal').innerText = parseFloat(zoomValue.value).toFixed(1) + 'x';
            document.getElementById('scaleVal').innerText = parseFloat(scaleValue.value).toFixed(2);
            document.getElementById('htSizeVal').innerText = parseFloat(halftoneSize.value).toFixed(1);
            document.getElementById('htFalloffVal').innerText = parseFloat(halftoneFalloff.value).toFixed(2);
            document.getElementById('fPhaseVal').innerText = parseFloat(flowPhase.value).toFixed(1);
            document.getElementById('fSpeedVal').innerText = parseFloat(flowSpeed.value).toFixed(2);
            document.getElementById('fadeVal').innerText = parseFloat(opacityFade.value).toFixed(2);
            document.getElementById('hIntenVal').innerText = parseFloat(highlightIntensity.value).toFixed(2);
            document.getElementById('widthVal').innerText = parseFloat(lineWidth.value).toFixed(1);
            document.getElementById('trailFramesVal').innerText = trailFrames.value;
            document.getElementById('trailSpacingVal').innerText = parseFloat(trailSpacing.value).toFixed(1);

            let style = styleSelect.value;
            let dashStyle = lineStyle.value;
            let wType = waveType.value;
            let lMode = layoutMode.value;

            document.getElementById('angleControl').style.display = (style === 'v_shape') ? 'block' : 'none';
            document.getElementById('axesControl').style.display = (style === 'multi_axis') ? 'block' : 'none';
            document.getElementById('polygonControl').style.display = (style === 'polygon_ring') ? 'block' : 'none';
            document.getElementById('circleStepControl').style.display = (style === 'circle_string' || style === 'ellipse_string' || style === 'circle_to_circle') ? 'block' : 'none';
            document.getElementById('ellipseRatioControl').style.display = (style === 'ellipse_string') ? 'block' : 'none';
            
            document.getElementById('flowControls').style.display = (dashStyle !== 'solid') ? 'block' : 'none';
            document.getElementById('halftoneSizeControl').style.display = (dashStyle === 'halftone') ? 'block' : 'none';
            document.getElementById('halftoneFalloffControl').style.display = (dashStyle === 'halftone') ? 'block' : 'none';
            document.getElementById('halftoneAnchorControl').style.display = (dashStyle === 'halftone') ? 'block' : 'none';
            
            document.getElementById('waveParamsControl').style.display = (wType !== 'none') ? 'block' : 'none';

            document.getElementById('radialControls').style.display = (lMode === 'radial') ? 'block' : 'none';
            document.getElementById('spiralControls').style.display = (lMode === 'spiral') ? 'block' : 'none';
            document.getElementById('linearControls').style.display = (lMode === 'linear') ? 'block' : 'none';
        }
        
        updateDisplays();
        drawLiveCanvas();

    </script>
</body>
</html>
